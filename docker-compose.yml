services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: zorbs
      POSTGRES_USER: zorbs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  zorbs:
    build: .
    restart: always
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://zorbs:${POSTGRES_PASSWORD}@db:5432/zorbs
    volumes:
      - ./uploads:/uploads
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt/live/zorbs.io:/etc/nginx/certs:ro
    depends_on:
      - zorbs

volumes:
  postgres_data:
