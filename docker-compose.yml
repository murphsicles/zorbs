services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: zorbs
      POSTGRES_USER: zorbs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M

  minio:
    image: minio/minio:RELEASE.2023-01-20T02-05-44Z
    restart: always
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: zorbs
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-zorbs_minio_2026}
      MINIO_DOMAIN: zorbs.io
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  zorbs:
    build: .
    restart: always
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://zorbs:${POSTGRES_PASSWORD}@db:5432/zorbs
      STORAGE_BACKEND: s3
      R2_BUCKET: zorbs
      R2_ENDPOINT: minio:9000
      R2_PUBLIC_URL: https://zorbs.io/r2/zorbs
      R2_ACCESS_KEY_ID: zorbs
      R2_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-zorbs_minio_2026}
    depends_on:
      - db
      - minio
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./assets:/app/assets:ro
    depends_on:
      - zorbs
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.3'
        reservations:
          memory: 64M

volumes:
  postgres_data:
  minio_data:
