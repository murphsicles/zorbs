events {}

http {
    server {
        listen 80;
        server_name zorbs.io;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl;
        server_name zorbs.io;

        ssl_certificate /etc/letsencrypt/live/zorbs.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/zorbs.io/privkey.pem;

        location / {
            proxy_pass http://zorbs:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
