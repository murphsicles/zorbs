events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Connection and request rate limiting zones
    limit_req_zone $binary_remote_addr zone=search:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Timeout hardening
    client_body_timeout   5s;
    client_header_timeout 5s;
    send_timeout          5s;
    keepalive_timeout     15s;
    keepalive_requests    100;

    # Buffer hardening
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 2 1k;
    client_max_body_size 50m;

    # General performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    reset_timedout_connection on;

    # Proxy buffer hardening
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    server {
        listen 80;
        server_name zorbs.io;
        return 301 https://$server_name$request_uri;
    }

    # Docker DNS resolver for upstream services
    resolver 127.0.0.11 valid=10s;

    server {
        listen 443 ssl;
        server_name zorbs.io;

        ssl_certificate /etc/letsencrypt/live/zorbs.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/zorbs.io/privkey.pem;

        # SSL hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        location /assets/ {
            alias /app/assets/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            limit_req zone=general burst=100 nodelay;
            limit_conn addr 30;
        }

        location /api/search {
            limit_req zone=search burst=10 nodelay;
            limit_conn addr 5;
            proxy_pass http://zorbs:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            limit_req zone=api burst=30 nodelay;
            limit_conn addr 10;
            proxy_pass http://zorbs:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # S3-compatible object storage (MinIO) — serves package downloads
        # CDN-ready: swap the proxy_pass to Cloudflare R2 URL later
        location /r2/ {
            limit_req zone=general burst=200 nodelay;
            limit_conn addr 50;
            proxy_pass http://minio:9000/;
            proxy_set_header Host zorbs.io;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering on;
            proxy_buffer_size 8k;
            proxy_buffers 8 32k;
            proxy_max_temp_file_size 0;
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header X-Cache-Status \$upstream_cache_status;
        }

        location / {
            limit_req zone=general burst=100 nodelay;
            limit_conn addr 20;
            proxy_pass http://zorbs:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
